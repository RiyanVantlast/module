<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countsheet Module</title>
    <!-- Tailwind & SheetJS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Print styles */
        @media print {
            @page {
                size: landscape;
                margin: 0.5cm;
            }
            body > *:not(#printContainer) {
                display: none !important;
            }
            #printContainer {
                display: block !important;
                padding: 0;
                font-family: 'Inter', sans-serif;
                width: 100%;
            }
            .print-header {
                text-align: center;
                margin-bottom: 10px;
                border-bottom: 2px solid #333;
                padding-bottom: 5px;
            }
            .print-header h1 {
                font-size: 24px;
                font-weight: 800;
                color: #1e3a8a;
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 1px;
            }
            .print-header p {
                margin: 2px 0;
                font-size: 10px;
                color: #333;
            }
            .print-table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 10px;
                border: 1px solid #888;
                font-size: 8px;
                table-layout: fixed;
            }
            .print-table th {
                background-color: #e5e7eb;
                font-weight: 700;
                padding: 5px 3px;
                border: 1px solid #666;
                text-align: center;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                overflow: hidden;
                word-wrap: break-word;
            }
            .print-table td {
                padding: 4px 3px;
                border: 1px solid #aaa;
                color: #111;
                overflow: hidden;
                word-wrap: break-word;
            }
            .print-table td.print-extra,
            .print-table th.print-extra {
                background-color: #f9fafb;
            }
            .print-footer {
                margin-top: 15px;
                text-align: right;
                font-size: 8px;
                color: #555;
                border-top: 1px dashed #aaa;
                padding-top: 4px;
            }
        }
    </style>
</head>

<script>
(function() {
    // ==================== INISIALISASI DOM ====================
    const dom = {
        customer: document.getElementById('customerSelect'),
        methodSelect: document.getElementById('methodSelect'),
        rowFilter: document.getElementById('rowFilter'),
        lvlFilter: document.getElementById('levelFilter'),
        skuFilter: document.getElementById('skuFilter'),
        expFilter: document.getElementById('expFilter'),
        uploadArea: document.getElementById('uploadArea'),
        processBtn: document.getElementById('processBtn'),
        downloadBtn: document.getElementById('downloadBtn'),
        printBtn: document.getElementById('printBtn'),
        tableHeader: document.getElementById('tableHeader'),
        tableBody: document.getElementById('tableBody'),
        rowCount: document.getElementById('rowCount'),
        emptyMsg: document.getElementById('emptyMsg'),
        errorDiv: document.getElementById('errorMessage'),
        errorText: document.getElementById('errorText'),
        loader: document.getElementById('loadingSpinner'),
        btnText: document.getElementById('btnText'),
        blindCountCheckbox: document.getElementById('blindCountCheckbox')
    };

    // ==================== VARIABEL GLOBAL ====================
    let currentResultRows = [];
    let currentCustomer = 'MAP';
    let currentMethod = 'location'; // 'location', 'transaction', 'empty', 'near_expirated'
    let blindCountEnabled = false; // Status Blind Count

    // Fungsi untuk memfilter array berdasarkan customer
    function filterByCustomer(arr, customer) {
        if (!arr.length) return arr;
        if (customer === 'OCCUPANCY') return arr;
        const hasCID = arr[0].hasOwnProperty('Customer ID');
        const hasCIDFM = arr[0].hasOwnProperty('Customer ID FM');
        if (!hasCID && !hasCIDFM) return arr;
        return arr.filter(item => {
            const val = hasCID ? item['Customer ID'] : item['Customer ID FM'];
            return String(val || '').trim() === customer;
        });
    }

    function excludeCML(arr) {
        if (!arr.length) return arr;
        const hasCID = arr[0].hasOwnProperty('Customer ID');
        const hasCIDFM = arr[0].hasOwnProperty('Customer ID FM');
        return arr.filter(item => {
            if (hasCID) return String(item['Customer ID'] || '').trim() !== 'CML';
            if (hasCIDFM) return String(item['Customer ID FM'] || '').trim() !== 'CML';
            return true;
        });
    }

    function parseFilterInput(input) {
        if (!input) return { singles: [], ranges: [] };
        const parts = input.split(',').map(s => s.trim()).filter(s => s);
        const singles = [];
        const ranges = [];
        parts.forEach(part => {
            if (part.includes('-')) {
                const [start, end] = part.split('-').map(s => s.trim());
                if (start && end) ranges.push({ start, end });
            } else {
                singles.push(part);
            }
        });
        return { singles, ranges };
    }

    const columnWidths = {
        'No': 27, 'Location ID': 50, 'SKU': 100, 'SKU Descr(L)': 200,
        'Trace ID': 60, 'Batch Number': 50, 'Expiration Date': 50,
        'UOM': 25, 'QTY On Hand': 30, 'Qty Actual': 35, 'Remark': 95, 'Location': 120
    };
    const DEFAULT_WIDTH = 60;

    function formatDateIndonesian(date) {
        const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
        const day = date.getDate();
        const month = months[date.getMonth()];
        const year = date.getFullYear();
        return `${day} ${month} ${year}`;
    }

    // ==================== FUNGSI BANTU ====================
    function readExcel(file) {
        return new Promise((resolve, reject) => {
            if (!file) return reject(new Error("File tidak ditemukan"));
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                    if (json.length < 1) throw new Error("File kosong");
                    const headers = json[0].map(h => String(h || '').trim());
                    const dataRows = json.slice(1).filter(r => r.some(c => c !== '')).map(row => {
                        let obj = {};
                        headers.forEach((h, i) => {
                            let val = row[i];
                            if ((h === 'Expiration Date' || h === 'Warehousing Date') && typeof val === 'number' && val > 30000) {
                                const d = XLSX.SSF.parse_date_code(val);
                                val = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
                            }
                            let key = h;
                            if (h === 'Batch No') key = 'Batch Number';
                            obj[key] = val;
                        });
                        return obj;
                    });
                    resolve(dataRows);
                } catch (err) { reject(err); }
            };
            reader.readAsArrayBuffer(file);
        });
    }

    function parseLoc(loc) {
        if (!loc || typeof loc !== 'string') return null;
        const p = loc.split('-');
        return p.length >= 3 ? { row: p[0], bin: p[1], lvl: p[2] } : null;
    }

    // Ekstrak angka dari string Row (contoh: "A01" → 1)
    function getRowNumber(rowStr) {
        const match = String(rowStr).match(/\d+/);
        return match ? parseInt(match[0], 10) : null;
    }

    // Sorting khusus Empty Location: Row → Bin ganjil → Bin genap → Level
    function sortEmptyLocation(rows) {
        const compareFn = (a, b) => {
            const la = parseLoc(a['Location ID']);
            const lb = parseLoc(b['Location ID']);
            if (!la || !lb) return 0;

            // 1. Row sebagai string
            if (la.row !== lb.row) return la.row.localeCompare(lb.row);

            // 2. Row sama → bandingkan paritas Bin (ganjil dulu)
            const binA = parseInt(la.bin, 10);
            const binB = parseInt(lb.bin, 10);
            const parityA = binA % 2;
            const parityB = binB % 2;
            if (parityA !== parityB) return parityB - parityA; // ganjil (1) vs genap (0) → ganjil dulu

            // 3. Paritas sama → bandingkan nilai Bin
            if (binA !== binB) return binA - binB;

            // 4. Bin sama → bandingkan Level numerik
            const lvlA = parseInt(la.lvl, 10);
            const lvlB = parseInt(lb.lvl, 10);
            return lvlA - lvlB;
        };
        return [...rows].sort(compareFn);
    }

    function processSort(rows) {
        if (currentCustomer === 'OCCUPANCY') return rows;
        return rows.sort((a, b) => {
            const lA = parseLoc(a['Location ID']), lB = parseLoc(b['Location ID']);
            if (!lA || !lB) return 0;
            if (lA.row !== lB.row) return lA.row.localeCompare(lB.row);
            const bA = parseInt(lA.bin), bB = parseInt(lB.bin);
            if ((bA % 2) !== (bB % 2)) return (bB % 2) - (bA % 2);
            const vA = parseInt(lA.lvl), vB = parseInt(lB.lvl);
            return vA !== vB ? vA - vB : bA - bB;
        });
    }

    function aggregateData(data, cust) {
        if (cust === 'OCCUPANCY') {
            const headers = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
            return data.map(item => {
                let obj = {};
                headers.forEach(h => obj[h] = item[h] || '');
                return obj;
            });
        }
        const keys = (cust === 'MAP' || cust === 'TUMI') 
            ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM']
            : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM'];
        const map = new Map();
        data.forEach(item => {
            const compositeKey = keys.map(k => String(item[k] || '')).join('|');
            const qty = parseFloat(String(item['QTY On Hand']).replace(',','.')) || 0;
            if (map.has(compositeKey)) {
                map.get(compositeKey)['QTY On Hand'] += qty;
            } else {
                map.set(compositeKey, { ...item, 'QTY On Hand': qty });
            }
        });
        return Array.from(map.values());
    }

                let filtered = rawData.filter(r => {
                    const l = parseLoc(r['Location ID']);
                    if (!l && currentCustomer !== 'OCCUPANCY') return false;
                    if (l) {
                        if (rowFilter.singles.length || rowFilter.ranges.length) {
                            let rowMatch = false;
                            if (rowFilter.singles.includes(l.row)) rowMatch = true;
                            if (!rowMatch) {
                                for (const range of rowFilter.ranges) {
                                    if (l.row >= range.start && l.row <= range.end) { rowMatch = true; break; }
                                }
                            }
                            if (!rowMatch) return false;
                        }
                        if (levelFilter.singles.length || levelFilter.ranges.length) {
                            let levelMatch = false;
                            if (levelFilter.singles.includes(l.lvl)) levelMatch = true;
                            if (!levelMatch) {
                                const levelNum = parseInt(l.lvl, 10);
                                for (const range of levelFilter.ranges) {
                                    const startNum = parseInt(range.start, 10);
                                    const endNum = parseInt(range.end, 10);
                                    if (!isNaN(levelNum) && !isNaN(startNum) && !isNaN(endNum)) {
                                        if (levelNum >= startNum && levelNum <= endNum) { levelMatch = true; break; }
                                    } else {
                                        if (l.lvl >= range.start && l.lvl <= range.end) { levelMatch = true; break; }
                                    }
                                }
                            }
                            if (!levelMatch) return false;
                        }
                    }
                    return true;
                });
                const skuList = dom.skuFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (skuList.length > 0) filtered = filtered.filter(r => skuList.includes(String(r['SKU'] || '')));
                const expList = dom.expFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (expList.length > 0) filtered = filtered.filter(r => expList.includes(String(r['Expiration Date'] || '')));
                if (binParity) {
                    filtered = filtered.filter(r => {
                        const locParsed = parseLoc(r['Location ID']);
                        if (!locParsed) return false;
                        const binNum = parseInt(locParsed.bin, 10);
                        if (isNaN(binNum)) return false;
                        if (binParity === 'odd') return binNum % 2 === 1;
                        if (binParity === 'even') return binNum % 2 === 0;
                        return true;
                    });
                }
                const finalData = processSort(aggregateData(filtered, currentCustomer));
                renderTable(finalData);
                if (finalData.length > 0) {
                    dom.downloadBtn.style.display = 'inline-flex';
                    dom.printBtn.style.display = 'inline-flex';
                    currentResultRows = finalData;
                } else {
                    throw new Error("Hasil proses kosong. Cek filter/isi file.");
                }

            } else if (type === 'transaction') {
                // ========== LOGIKA ASLI TRANSACTION ==========
                const file1 = document.getElementById('file1').files[0];
                const file2 = document.getElementById('file2').files[0];
                if (!file1 || !file2) throw new Error("Kedua file (Inventory & Transaction) harus diunggah!");
                let [doc1, doc2] = await Promise.all([readExcel(file1), readExcel(file2)]);
                if (currentCustomer === 'OCCUPANCY') {
                    doc1 = excludeCML(doc1);
                    doc2 = excludeCML(doc2);
                } else {
                    doc1 = filterByCustomer(doc1, currentCustomer);
                    doc2 = filterByCustomer(doc2, currentCustomer);
                }
                doc1 = doc1.filter(item => !String(item['Trace ID'] || '').trim().includes('*'));
                doc2 = doc2.filter(item => !String(item['Trace ID'] || '').trim().includes('*'));
                doc2 = doc2.filter(row => String(row['Transaction Type'] || '').trim() === 'Picking&Packing');
                const map1 = new Map();
                doc1.forEach(row => {
                    const loc = row['Location ID'] || '';
                    const sku = row['SKU'] || '';
                    const trace = row['Trace ID'] || '';
                    if (!loc && !sku && !trace) return;
                    const key = [loc, sku, trace].join('|');
                    const desc = row['SKU Descr(L)'] || '';
                    const batch = row['Batch Number'] || row['Batch No'] || '';
                    const uom = row['UOM'] || '';
                    const qty = parseFloat(String(row['QTY On Hand']).replace(',', '.')) || 0;
                    if (map1.has(key)) {
                        const existing = map1.get(key);
                        existing.qty += qty;
                    } else {
                        map1.set(key, { loc, sku, trace, desc, batch, uom, qty });
                    }
                });
                const map2 = new Map();
                doc2.forEach(row => {
                    const loc = row['Location FM'] || '';
                    const sku = row['SKU FM'] || '';
                    const trace = row['ID FM'] || '';
                    if (!loc && !sku && !trace) return;
                    const key = [loc, sku, trace].join('|');
                    const desc = row['SKU Descr(L)'] || '';
                    const batch = row['Batch No'] || '';
                    const uom = row['UOM FM'] || '';
                    if (!map2.has(key)) map2.set(key, { loc, sku, trace, desc, batch, uom });
                });
                const results = [];
                for (let [key, transData] of map2.entries()) {
                    const [loc, sku, trace] = key.split('|');
                    const row = {
                        'Location ID': loc, 'SKU': sku, 'Trace ID': trace,
                        'SKU Descr(L)': '', 'Batch Number': '', 'UOM': '', 'QTY On Hand': 0
                    };
                    if (map1.has(key)) {
                        const invData = map1.get(key);
                        row['SKU Descr(L)'] = invData.desc;
                        row['Batch Number'] = invData.batch;
                        row['UOM'] = invData.uom;
                        row['QTY On Hand'] = invData.qty;
                    } else {
                        row['SKU Descr(L)'] = transData.desc;
                        row['Batch Number'] = transData.batch;
                        row['UOM'] = transData.uom;
                    }
                    results.push(row);
                }
                const excludedKeywords = ['RCV1', 'SORTATIONJBK01'];
                let filteredResults = results.filter(r => {
                    const loc = r['Location ID'] || '';
                    return !excludedKeywords.some(keyword => loc.toUpperCase().includes(keyword.toUpperCase()));
                });
                const skuList = dom.skuFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (skuList.length > 0) filteredResults = filteredResults.filter(r => skuList.includes(r['SKU']));
                const rowFilter = parseFilterInput(dom.rowFilter.value);
                const levelFilter = parseFilterInput(dom.lvlFilter.value);
                if (rowFilter.singles.length || rowFilter.ranges.length || levelFilter.singles.length || levelFilter.ranges.length) {
                    filteredResults = filteredResults.filter(r => {
                        const locParsed = parseLoc(r['Location ID']);
                        if (!locParsed) return true;
                        if (rowFilter.singles.length || rowFilter.ranges.length) {
                            let rowMatch = false;
                            if (rowFilter.singles.includes(locParsed.row)) rowMatch = true;
                            if (!rowMatch) {
                                for (const range of rowFilter.ranges) {
                                    if (locParsed.row >= range.start && locParsed.row <= range.end) { rowMatch = true; break; }
                                }
                            }
                            if (!rowMatch) return false;
                        }
                        if (levelFilter.singles.length || levelFilter.ranges.length) {
                            let levelMatch = false;
                            if (levelFilter.singles.includes(locParsed.lvl)) levelMatch = true;
                            if (!levelMatch) {
                                const levelNum = parseInt(locParsed.lvl, 10);
                                for (const range of levelFilter.ranges) {
                                    const startNum = parseInt(range.start, 10);
                                    const endNum = parseInt(range.end, 10);
                                    if (!isNaN(levelNum) && !isNaN(startNum) && !isNaN(endNum)) {
                                        if (levelNum >= startNum && levelNum <= endNum) { levelMatch = true; break; }
                                    } else {
                                        if (locParsed.lvl >= range.start && locParsed.lvl <= range.end) { levelMatch = true; break; }
                                    }
                                }
                            }
                            if (!levelMatch) return false;
                        }
                        return true;
                    });
                }
                if (binParity) {
                    filteredResults = filteredResults.filter(r => {
                        const locParsed = parseLoc(r['Location ID']);
                        if (!locParsed) return false;
                        const binNum = parseInt(locParsed.bin, 10);
                        if (isNaN(binNum)) return false;
                        if (binParity === 'odd') return binNum % 2 === 1;
                        if (binParity === 'even') return binNum % 2 === 0;
                        return true;
                    });
                }
                filteredResults.sort((a, b) => (a['Location ID'] || '').localeCompare(b['Location ID'] || ''));
                renderTable(filteredResults);
                if (filteredResults.length > 0) {
                    dom.downloadBtn.style.display = 'inline-flex';
                    dom.printBtn.style.display = 'inline-flex';
                    currentResultRows = filteredResults;
                } else {
                    throw new Error("Hasil proses kosong.");
                }

            } else if (type === 'empty') {
                // ========== LOGIKA EMPTY LOCATION ==========
                const fileInv = document.getElementById('fileInv').files[0];
                const fileMaster = document.getElementById('fileMaster').files[0];
                if (!fileInv || !fileMaster) throw new Error("Kedua file (Inventory & Master) harus diunggah!");
                const [invData, masterData] = await Promise.all([readExcel(fileInv), readExcel(fileMaster)]);

                // Buat Set berisi Location ID dari inventory (yang sudah terisi)
                const invLocationSet = new Set();
                invData.forEach(row => {
                    if (row['Location ID']) invLocationSet.add(String(row['Location ID']).trim());
                });

                // Dapatkan lokasi kosong dari master data
                let emptyLocations = masterData.filter(row => {
                    const loc = row['Location ID'];
                    return loc && !invLocationSet.has(String(loc).trim());
                });

                // ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
                // BAGIAN BARU: AMBIL NILAI FILTER DARI INPUT
                // ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
                const rowFilter = parseFilterInput(dom.rowFilter.value);    // dari input "Filter Row"
                const levelFilter = parseFilterInput(dom.lvlFilter.value);  // dari input "Filter Level"
                const binParityEmpty = document.querySelector('input[name="binParity"]:checked')?.value || ''; // odd/even/all

                // ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
                // TERAPKAN FILTER PADA emptyLocations
                // ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
                emptyLocations = emptyLocations.filter(row => {
                    const loc = row['Location ID'];
                    if (!loc) return false;

                    const parsed = parseLoc(loc);   // fungsi parsing "A01-001-01" → { row, bin, lvl }
                    if (!parsed) return false;      // format lokasi tidak sesuai

                    // --- Filter Row (contoh: "AO,AR" atau "A-C") ---
                    if (rowFilter.singles.length || rowFilter.ranges.length) {
                        let rowMatch = false;
                        if (rowFilter.singles.includes(parsed.row)) rowMatch = true;
                        if (!rowMatch) {
                            for (const range of rowFilter.ranges) {
                                if (parsed.row >= range.start && parsed.row <= range.end) {
                                    rowMatch = true;
                                    break;
                                }
                            }
                        }
                        if (!rowMatch) return false;
                    }

                    // --- Filter Level (contoh: "01,10" atau "01-05") ---
                    if (levelFilter.singles.length || levelFilter.ranges.length) {
                        let levelMatch = false;
                        if (levelFilter.singles.includes(parsed.lvl)) levelMatch = true;
                        if (!levelMatch) {
                            const levelNum = parseInt(parsed.lvl, 10);
                            for (const range of levelFilter.ranges) {
                                const startNum = parseInt(range.start, 10);
                                const endNum = parseInt(range.end, 10);
                                if (!isNaN(levelNum) && !isNaN(startNum) && !isNaN(endNum)) {
                                    if (levelNum >= startNum && levelNum <= endNum) {
                                        levelMatch = true;
                                        break;
                                    }
                                } else {
                                    // fallback string comparison
                                    if (parsed.lvl >= range.start && parsed.lvl <= range.end) {
                                        levelMatch = true;
                                        break;
                                    }
                                }
                            }
                        }
                        if (!levelMatch) return false;
                    }

                    // --- Filter Bin Parity (ganjil/genap) ---
                    if (binParityEmpty) {
                        const binNum = parseInt(parsed.bin, 10);
                        if (isNaN(binNum)) return false;
                        if (binParityEmpty === 'odd' && binNum % 2 === 0) return false;
                        if (binParityEmpty === 'even' && binNum % 2 === 1) return false;
                    }

                    return true; // lolos semua filter
                });

                // Setelah difilter, baru lakukan sorting sesuai aturan Empty Location
                emptyLocations = sortEmptyLocation(emptyLocations);

                // Ubah ke format untuk tabel preview (renderEmptyTable)
                const resultRows = emptyLocations.map((item, idx) => ({
                    'No': idx + 1,
                    'Location': item['Location ID'] || '',
                    'Remark': ''
                }));

                    throw new Error("Tidak ada lokasi kosong ditemukan.");

                // ========== NEAR EXPIRATED (6 BULAN) ==========
                const file = document.getElementById('fileLoc').files[0];
                if (!file) throw new Error("Pilih file Inventory Balance dulu!");
                let rawData = await readExcel(file);

                // Filter customer seperti location
                if (currentCustomer === 'OCCUPANCY') {
                    rawData = excludeCML(rawData);
                } else {
                    if (rawData.length > 0 && rawData[0].hasOwnProperty('Customer ID')) {
                        rawData = rawData.filter(item => String(item['Customer ID'] || '').trim() === currentCustomer);
                    }
                }
                rawData = rawData.filter(item => !String(item['Trace ID'] || '').trim().includes('*'));

                // === FILTER NEAR EXPIRY (6 bulan ke depan) ===
                const today = new Date();
                const sixMonthsLater = new Date(today);
                sixMonthsLater.setMonth(sixMonthsLater.getMonth() + 6); // Tepat 6 bulan kalender

                rawData = rawData.filter(item => {
                    const expRaw = item['Expiration Date'];
                    if (!expRaw) return false;
                    let expDate;
                    if (typeof expRaw === 'number' && expRaw > 30000) {
                        // Excel serial date
                        const d = XLSX.SSF.parse_date_code(expRaw);
                        expDate = new Date(d.y, d.m-1, d.d);
                    } else {
                        expDate = new Date(expRaw);
                    }
                    return !isNaN(expDate) && expDate <= sixMonthsLater;
                });

                // Terapkan filter Row, Level, SKU, Exp, Bin Parity (sama seperti location)
                const rowFilterNear = parseFilterInput(dom.rowFilter.value);
                const levelFilterNear = parseFilterInput(dom.lvlFilter.value);
                let filtered = rawData.filter(r => {
                    const l = parseLoc(r['Location ID']);
                    if (!l && currentCustomer !== 'OCCUPANCY') return false;
                    if (l) {
                        if (rowFilterNear.singles.length || rowFilterNear.ranges.length) {
                            let rowMatch = false;
                            if (rowFilterNear.singles.includes(l.row)) rowMatch = true;
                            if (!rowMatch) {
                                for (const range of rowFilterNear.ranges) {
                                    if (l.row >= range.start && l.row <= range.end) { rowMatch = true; break; }
                                }
                            }
                            if (!rowMatch) return false;
                        }
                        if (levelFilterNear.singles.length || levelFilterNear.ranges.length) {
                            let levelMatch = false;
                            if (levelFilterNear.singles.includes(l.lvl)) levelMatch = true;
                            if (!levelMatch) {
                                const levelNum = parseInt(l.lvl, 10);
                                for (const range of levelFilterNear.ranges) {
                                    const startNum = parseInt(range.start, 10);
                                    const endNum = parseInt(range.end, 10);
                                    if (!isNaN(levelNum) && !isNaN(startNum) && !isNaN(endNum)) {
                                        if (levelNum >= startNum && levelNum <= endNum) { levelMatch = true; break; }
                                    } else {
                                        if (l.lvl >= range.start && l.lvl <= range.end) { levelMatch = true; break; }
                                    }
                                }
                            }
                            if (!levelMatch) return false;
                        }
                    }
                    return true;
                });

                const skuListNear = dom.skuFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (skuListNear.length > 0) filtered = filtered.filter(r => skuListNear.includes(String(r['SKU'] || '')));
                const expListNear = dom.expFilter.value.split(',').map(s => s.trim()).filter(s => s);
                if (expListNear.length > 0) filtered = filtered.filter(r => expListNear.includes(String(r['Expiration Date'] || '')));
                if (binParity) {
                    filtered = filtered.filter(r => {
                        const locParsed = parseLoc(r['Location ID']);
                        if (!locParsed) return false;
                        const binNum = parseInt(locParsed.bin, 10);
                        if (isNaN(binNum)) return false;
                        if (binParity === 'odd') return binNum % 2 === 1;
                        if (binParity === 'even') return binNum % 2 === 0;
                        return true;
                    });
                }

                const finalData = processSort(aggregateData(filtered, currentCustomer));
                renderTable(finalData);
                if (finalData.length > 0) {
                    dom.downloadBtn.style.display = 'inline-flex';
                    dom.printBtn.style.display = 'inline-flex';
                    currentResultRows = finalData;
                    currentMethod = 'near_expirated'; // Pastikan method tersimpan
                } else {
                    throw new Error("Hasil proses kosong. Cek filter/isi file.");
                }
            }

        } catch (err) {
            dom.errorDiv.style.display = 'block';
            dom.errorText.innerText = err.message;
        } finally {
            dom.processBtn.disabled = false;
            dom.loader.style.display = 'none';
            dom.btnText.innerText = 'CREATED COUNTSHEET';
        }
    }

    function download() {
        if (currentMethod === 'empty') {
            const cols = ['No', 'Location', 'Remark'];
            const dataRows = currentResultRows.map(r => [r.No, r.Location, '']);
            const data = [cols, ...dataRows];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Empty Locations");
            XLSX.writeFile(wb, `EmptyLocation_${new Date().getTime()}.xlsx`);
            return;
        }

        let effectiveBaseCols;
        if (currentMethod === 'transaction') {
            const baseCols = ['Location ID', 'SKU', 'SKU Descr(L)', 'Trace ID', 'Batch Number', 'UOM', 'QTY On Hand'];
            effectiveBaseCols = blindCountEnabled ? baseCols.filter(c => c !== 'QTY On Hand') : baseCols;
            const cols = ['No', ...effectiveBaseCols, 'Qty Actual', 'Remark'];
            const dataRows = currentResultRows.map((r, idx) => [idx+1, ...effectiveBaseCols.map(c => r[c] || ''), '', '']);
            const data = [cols, ...dataRows];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Result");
            XLSX.writeFile(wb, `${currentCustomer}_${new Date().getTime()}.xlsx`);
        } else {
            if (currentCustomer === 'OCCUPANCY') {
                const occCols = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
                const effectiveCols = blindCountEnabled ? occCols.filter(c => c !== 'QTY On Hand') : occCols;
                const dataRows = currentResultRows.map(r => effectiveCols.map(c => r[c] || ''));
                const data = [effectiveCols, ...dataRows];
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Result");
                XLSX.writeFile(wb, `${currentCustomer}_${new Date().getTime()}.xlsx`);
            } else {
                let baseCols = (currentCustomer === 'MAP' || currentCustomer === 'TUMI')
                    ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM','QTY On Hand']
                    : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM','QTY On Hand'];
                effectiveBaseCols = blindCountEnabled ? baseCols.filter(c => c !== 'QTY On Hand') : baseCols;
                const cols = ['No', ...effectiveBaseCols, 'Qty Actual', 'Remark'];
                const dataRows = currentResultRows.map((r, idx) => [idx+1, ...effectiveBaseCols.map(c => r[c] || ''), '', '']);
                const data = [cols, ...dataRows];
                const ws = XLSX.utils.aoa_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Result");
                XLSX.writeFile(wb, `${currentCustomer}_${new Date().getTime()}.xlsx`);
            }
        }
    }

                    </div>
                `;

                pageHtml += `<table style="width:100%; border-collapse: collapse; table-layout: fixed;">`;
                pageHtml += `<tr>`;

                for (let i = 0; i < chunksPerPage; i++) {
                    const colWidth = (100 / chunksPerPage).toFixed(2) + '%';
                    pageHtml += `<td style="width: ${colWidth}; vertical-align: top; padding: 0 2px;">`;
                    pageHtml += `<table class="print-table" style="width:100%;">`;
                    pageHtml += `<thead><tr>${headerCells}</tr></thead>`;
                    pageHtml += `<tbody>`;

                    const chunk = pageChunks[i] || [];
                    for (let j = 0; j < chunkSize; j++) {
                        if (j < chunk.length) {
                            const r = chunk[j];
                            pageHtml += `<tr><td>${r.No}</td><td>${r.Location}</td><td></td></tr>`;
                        } else {
                            pageHtml += `<tr><td>&nbsp;</td><td></td><td></td></tr>`;
                        }
                    }

                    pageHtml += `</tbody></table>`;
                    pageHtml += `</td>`;
                }

                pageHtml += `</tr>`;
                pageHtml += `</table>`;

                pageHtml += `
                    <div class="print-footer" style="margin-top:15px;">
                        Halaman ${page+1} dari ${totalPages}
                    </div>
                </div>
                `;

                allPagesHtml += pageHtml;
            }

            document.getElementById('printContainer').innerHTML = allPagesHtml;
            setTimeout(() => window.print(), 100);
            return;
        }

        // ========== CETAK LOCATION, TRANSACTION, NEAR EXPIRATED ==========
        const rows = currentResultRows;
        const rowsPerPage = 25;
        const totalPages = Math.ceil(rows.length / rowsPerPage);

        let baseCols;
        if (currentMethod === 'transaction') {
            baseCols = ['Location ID', 'SKU', 'SKU Descr(L)', 'Trace ID', 'Batch Number', 'UOM', 'QTY On Hand'];
        } else {
            if (currentCustomer === 'OCCUPANCY') {
                baseCols = ['Customer ID','SKU','SKU Descr(L)','Location ID','Trace ID','UOM','Whether damaged','Expiration Date','Warehousing Date','QTY On Hand','QTY Allocated','QTY On Hold','QTY Available','QtyPerPallet','QtyCBM'];
            } else {
                baseCols = (currentCustomer === 'MAP' || currentCustomer === 'TUMI')
                    ? ['Location ID','SKU','SKU Descr(L)','Trace ID','Batch Number','UOM','QTY On Hand']
                    : ['Location ID','SKU','SKU Descr(L)','Trace ID','Expiration Date','UOM','QTY On Hand'];
            }
        }

        // Blind count: sembunyikan QTY On Hand
        const effectiveBaseCols = blindCountEnabled ? baseCols.filter(c => c !== 'QTY On Hand') : baseCols;
        const printCols = ['No', ...effectiveBaseCols, 'Qty Actual', 'Remark'];

        const headerCells = printCols.map(colName => {
            let width = columnWidths[colName] || DEFAULT_WIDTH;
            let className = (colName === 'Qty Actual' || colName === 'Remark') ? ' class="print-extra"' : '';
            return `<th${className} style="width: ${width}px;">${colName}</th>`;
        }).join('');

        let allPagesHtml = '';

        for (let page = 0; page < totalPages; page++) {
            const start = page * rowsPerPage;
            const end = Math.min(start + rowsPerPage, rows.length);
            const pageRows = rows.slice(start, end);

            const bodyRows = pageRows.map((r, idx) => {
                const nomor = start + idx + 1;
                const dataCells = [
                    `<td>${nomor}</td>`,
                    ...effectiveBaseCols.map(c => `<td>${r[c] || '-'}</td>`)
                ];
                dataCells.push('<td class="print-extra"></td>'); // Qty Actual
                dataCells.push('<td class="print-extra"></td>'); // Remark
                return `<tr>${dataCells.join('')}</tr>`;
            }).join('');

            const pageHtml = `
            <div style="display: flex; align-items: center; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px;">
                <div style="display: flex; align-items: center; flex-shrink: 0;">
                    <img src="${lincgrpLogo}" alt="Lincgrp" style="height: 80px; width: auto;">
                    <div style="border: 1px solid #333; padding: 4px 8px; margin-left: 8px; font-size: 10px; width: 200px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>Nama Counter:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 4px;">
                            <span>Paraf:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                    </div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <h1 style="font-size: 24px; font-weight: 800; color: #1e3a8a; margin: 0;">CYCLE COUNT SHEET</h1>
                    <p style="margin: 2px 0; font-size: 15px;">Customer: ${currentCustomer} | Tanggal: ${formatDateIndonesian(new Date())}</p>
                </div>
                <img src="${linclogLogo}" alt="Linclog" style="height: 80px; width: auto; flex-shrink: 0;">
            </div>
            <table class="print-table">
                <thead><tr>${headerCells}</tr></thead>
                <tbody>${bodyRows}</tbody>
            </table>
            <div class="print-footer">
                <p>Dicetak pada: ${formatDateIndonesian(new Date())} ${new Date().toLocaleTimeString('id-ID')} | Halaman ${String(page+1).padStart(2,'0')} of ${String(totalPages).padStart(2,'0')}</p>
                <p style="margin-top:4px;">Catatan: Isi kolom Qty Actual dan Remark sesuai hasil count manual.</p>
                <p>PT CIPTA MAPAN LOGISTICS - SITE JABABEKA</p>
            </div>
            `;
            allPagesHtml += pageHtml;
        }

        // Halaman kosong "COUNTSHEET TEMUAN" (23 baris)
        const blankRows = [];
        for (let i = 1; i <= 23; i++) {
            const cells = [
                `<td>${i}</td>`,
                ...effectiveBaseCols.map(c => `<td></td>`),
                `<td class="print-extra"></td>`,
                `<td class="print-extra"></td>`
            ];
            blankRows.push(`<tr>${cells.join('')}</tr>`);
        }

        const blankPageHtml = `
        <div style="page-break-before: always;">
            <div style="display: flex; align-items: center; border-bottom: 2px solid #333; padding-bottom: 5px; margin-bottom: 10px;">
                <div style="display: flex; align-items: center; flex-shrink: 0;">
                    <img src="${lincgrpLogo}" alt="Lincgrp" style="height: 80px; width: auto;">
                    <div style="border: 1px solid #333; padding: 4px 8px; margin-left: 8px; font-size: 10px; width: 200px;">
                        <div style="display: flex; justify-content: space-between;">
                            <span>Nama Counter:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 4px;">
                            <span>Paraf:</span>
                            <span style="border-bottom: 1px solid #000; width: 100px; display: inline-block;"></span>
                        </div>
                    </div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <h1 style="font-size: 24px; font-weight: 800; color: #1e3a8a; margin: 0;">COUNTSHEET TEMUAN</h1>
                    <p style="margin: 2px 0; font-size: 15px;">Customer: ${currentCustomer} | Tanggal: ${formatDateIndonesian(new Date())}</p>
                </div>
                <img src="${linclogLogo}" alt="Linclog" style="height: 80px; width: auto; flex-shrink: 0;">
            </div>
            <table class="print-table">
                <thead><tr>${headerCells}</tr></thead>
                <tbody>${blankRows.join('')}</tbody>
            </table>
            <div class="print-footer">
                <p>Dicetak pada: ${formatDateIndonesian(new Date())} ${new Date().toLocaleTimeString('id-ID')} | Halaman ${String(totalPages+1).padStart(2,'0')} of ${String(totalPages+1).padStart(2,'0')}</p>
                <p style="margin-top:4px;">Catatan: Isi kolom Qty Actual dan Remark sesuai hasil count manual.</p>
                <p>PT CIPTA MAPAN LOGISTICS - SITE JABABEKA</p>
            </div>
        </div>
        `;
        allPagesHtml += blankPageHtml;

        document.getElementById('printContainer').innerHTML = allPagesHtml;
        setTimeout(() => {
            window.print();
        }, 100);
    }

    // ==================== EVENT LISTENERS ====================
    dom.methodSelect.addEventListener('change', renderUploadFields);
    dom.processBtn.addEventListener('click', handleProcess);
    dom.downloadBtn.addEventListener('click', download);
    dom.printBtn.addEventListener('click', printReport);
    dom.blindCountCheckbox.addEventListener('change', function() {
        blindCountEnabled = this.checked;
        if (currentResultRows.length > 0) {
            if (currentMethod === 'empty') {
                renderEmptyTable(currentResultRows);
            } else {
                renderTable(currentResultRows);
            }
        }
    });

    // ==================== INISIALISASI AWAL ====================
    renderUploadFields();
})();
</script>
